<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCF — Human Comfort Factors</title>
    <meta name="description" content="Walk comfort scoring tool for US cities. See how comfortable every street really is.">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0f1117;
            --bg-panel: #1a1d27;
            --bg-input: #252836;
            --text-primary: #e4e6ed;
            --text-secondary: #8b8fa3;
            --accent: #6c63ff;
            --accent-hover: #5a52e0;
            --green: #22c55e;
            --yellow: #eab308;
            --orange: #f97316;
            --red: #ef4444;
            --border: #2d3040;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 1000;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        header h1 span {
            color: var(--accent);
        }

        /* Search */
        .search-container {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 500px;
        }

        #city-input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #city-input:focus {
            border-color: var(--accent);
        }

        #city-input::placeholder {
            color: var(--text-secondary);
        }

        #search-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        #search-btn:hover { background: var(--accent-hover); }
        #search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Status */
        #status {
            font-size: 13px;
            color: var(--text-secondary);
            margin-left: auto;
        }

        #status.loading { color: var(--yellow); }
        #status.error { color: var(--red); }
        #status.success { color: var(--green); }

        /* Map */
        #map {
            flex: 1;
            width: 100%;
        }

        /* Legend */
        .legend {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            z-index: 1000;
            min-width: 160px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        .legend h3 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .legend-color {
            width: 24px;
            height: 4px;
            border-radius: 2px;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 17, 23, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loading-overlay.active { display: flex; }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Stats bar */
        .stats-bar {
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            padding: 8px 24px;
            display: none;
            gap: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .stats-bar.active { display: flex; }

        .stat-item strong {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <header>
        <h1><span>HCF</span> Human Comfort Factors</h1>
        <div class="search-container">
            <input type="text" id="city-input"
                   placeholder="Enter a US city (e.g. Denver, Colorado, USA)"
                   autocomplete="off" />
            <button id="search-btn">Analyze</button>
        </div>
        <span id="status">Ready</span>
    </header>

    <div id="map"></div>

    <div class="stats-bar" id="stats-bar">
        <span class="stat-item">Segments: <strong id="stat-segments">—</strong></span>
        <span class="stat-item">Avg Score: <strong id="stat-avg">—</strong></span>
        <span class="stat-item">Min: <strong id="stat-min">—</strong></span>
        <span class="stat-item">Max: <strong id="stat-max">—</strong></span>
    </div>

    <div class="legend">
        <h3>Comfort Score</h3>
        <div class="legend-item">
            <div class="legend-color" style="background: #22c55e;"></div>
            80–100 Excellent
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #84cc16;"></div>
            60–80 Good
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #eab308;"></div>
            40–60 Fair
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #f97316;"></div>
            20–40 Poor
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ef4444;"></div>
            0–20 Hostile
        </div>
    </div>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>

    <script>
        // ── Map Setup ──
        const map = L.map('map', {
            zoomControl: true,
            attributionControl: true,
        }).setView([39.8283, -98.5795], 5); // Center of US

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19,
        }).addTo(map);

        let comfortLayer = null;

        // ── Color Scale ──
        function scoreToColor(score) {
            if (score >= 80) return '#22c55e';
            if (score >= 60) return '#84cc16';
            if (score >= 40) return '#eab308';
            if (score >= 20) return '#f97316';
            return '#ef4444';
        }

        function scoreToLabel(score) {
            if (score >= 80) return 'Excellent';
            if (score >= 60) return 'Good';
            if (score >= 40) return 'Fair';
            if (score >= 20) return 'Poor';
            return 'Hostile';
        }

        // ── API Call ──
        // ── API Config ──
        // Configurable: ?api=https://my-backend.com or default to same origin
        const urlParams = new URLSearchParams(window.location.search);
        const API_BASE = urlParams.get('api') || window.location.origin;

        async function analyzeCity(cityQuery) {
            const status = document.getElementById('status');
            const loading = document.getElementById('loading');
            const searchBtn = document.getElementById('search-btn');
            const statsBar = document.getElementById('stats-bar');

            status.textContent = 'Fetching data...';
            status.className = 'loading';
            loading.classList.add('active');
            searchBtn.disabled = true;

            try {
                const url = `${API_BASE}/api/v1/comfort?city=${encodeURIComponent(cityQuery)}&max_segments=200`;
                const resp = await fetch(url);

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || `HTTP ${resp.status}`);
                }

                const geojson = await resp.json();
                displayResults(geojson, cityQuery);

                status.textContent = `${geojson.features.length} segments scored`;
                status.className = 'success';

            } catch (err) {
                status.textContent = `Error: ${err.message}`;
                status.className = 'error';
                console.error('Analysis failed:', err);
            } finally {
                loading.classList.remove('active');
                searchBtn.disabled = false;
            }
        }

        // ── Display Results ──
        function displayResults(geojson, cityQuery) {
            // Remove previous layer
            if (comfortLayer) {
                map.removeLayer(comfortLayer);
            }

            // Add GeoJSON layer with styled segments
            comfortLayer = L.geoJSON(geojson, {
                style: function(feature) {
                    const score = feature.properties.comfort_score;
                    const dq = feature.properties.data_quality || {};
                    const hasDefaults = Object.values(dq).some(v => v !== 'real');
                    return {
                        color: scoreToColor(score),
                        weight: hasDefaults ? 2 : 3,
                        opacity: hasDefaults ? 0.45 : 0.85,
                        dashArray: hasDefaults ? '6 4' : null,
                    };
                },
                onEachFeature: function(feature, layer) {
                    const p = feature.properties;
                    const label = scoreToLabel(p.comfort_score);
                    layer.bindPopup(`
                        <div style="font-family: system-ui; min-width: 160px;">
                            <div style="font-size: 24px; font-weight: 700; color: ${scoreToColor(p.comfort_score)};">
                                ${p.comfort_score}
                            </div>
                            <div style="font-size: 12px; color: #666; margin-bottom: 8px;">${label}</div>
                            <div style="font-size: 13px;">
                                ${p.noise_dba !== null ? `🔊 Noise: ${p.noise_dba.toFixed(1)} dBA<br>` : ''}
                                ${p.canopy_height_m !== null ? `🌳 Canopy: ${p.canopy_height_m.toFixed(1)}m (${p.canopy_pct.toFixed(0)}% shade)` : ''}
                            </div>
                        </div>
                    `);
                },
            }).addTo(map);

            // Fit map to results
            const bounds = comfortLayer.getBounds();
            if (bounds.isValid()) {
                map.fitBounds(bounds, { padding: [30, 30] });
            }

            // Update stats
            const scores = geojson.features.map(f => f.properties.comfort_score);
            const avg = scores.reduce((a, b) => a + b, 0) / scores.length;

            document.getElementById('stat-segments').textContent = scores.length;
            document.getElementById('stat-avg').textContent = avg.toFixed(1);
            document.getElementById('stat-min').textContent = Math.min(...scores).toFixed(1);
            document.getElementById('stat-max').textContent = Math.max(...scores).toFixed(1);
            document.getElementById('stats-bar').classList.add('active');
        }

        // ── Event Handlers ──
        document.getElementById('search-btn').addEventListener('click', () => {
            const city = document.getElementById('city-input').value.trim();
            if (city) analyzeCity(city);
        });

        document.getElementById('city-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const city = e.target.value.trim();
                if (city) analyzeCity(city);
            }
        });
    </script>
</body>
</html>
