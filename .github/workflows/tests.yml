name: HCF Test Suite

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:  # Allow manual triggering

jobs:
  scoring-tests:
    name: Scoring Engine (Pure Math)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pytest
      - name: Run scoring tests
        run: python -m pytest tests/test_scoring.py -v --tb=short -m "scoring and not slow"

  api-data-tests:
    name: API Data Sources (Real Data)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install osmnx geopandas shapely requests pytest pydantic rasterio boto3
      - name: Run noise API tests
        run: python -m pytest tests/test_noise.py -v --tb=short
      - name: Run canopy API tests
        run: python -m pytest tests/test_canopy.py -v --tb=short

  network-tests:
    name: OSM Network Fetching
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install osmnx geopandas shapely requests pytest
      - name: Run network tests
        run: python -m pytest tests/test_network.py -v --tb=short

  integration-tests:
    name: End-to-End Integration
    needs: [scoring-tests, api-data-tests, network-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install osmnx geopandas shapely requests pytest pydantic fastapi uvicorn rasterio boto3
      - name: Run integration tests
        run: python -m pytest tests/test_integration.py -v --tb=short
