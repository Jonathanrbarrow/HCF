name: HCF CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ── Backend Tests ──────────────────────────────────────────
  scoring-tests:
    name: "Backend: Scoring Engine"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend
        run: pip install -e ".[dev]"
      - name: Run scoring tests
        run: python -m pytest tests/test_scoring.py -v --tb=short -m "scoring and not slow"

  api-data-tests:
    name: "Backend: API Data Sources"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend
        run: pip install -e ".[dev]"
      - name: Run noise API tests
        run: python -m pytest tests/test_noise.py -v --tb=short
      - name: Run canopy API tests
        run: python -m pytest tests/test_canopy.py -v --tb=short
      - name: Run heat API tests
        run: python -m pytest tests/test_heat.py -v --tb=short

  network-tests:
    name: "Backend: OSM Network"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend
        run: pip install -e ".[dev]"
      - name: Run network tests
        run: python -m pytest tests/test_network.py -v --tb=short
      - name: Run routing tests
        run: python -m pytest tests/test_routing.py -v --tb=short

  integration-tests:
    name: "Backend: Integration"
    needs: [scoring-tests, api-data-tests, network-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: python -m pytest tests/test_integration.py -v --tb=short

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    name: "Frontend: Lint, Type-check, Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Type check
        run: npm run type-check
      - name: Build
        run: npm run build
