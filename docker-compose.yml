services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src     # Hot reload source changes
    environment:
      - HCF_ENV=development
      - HCF_CACHE_DIR=/tmp/hcf-cache
      - 'HCF_CORS_ORIGINS=["http://localhost:5173"]'
    command: uvicorn hcf.api.app:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    image: node:20-slim
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
